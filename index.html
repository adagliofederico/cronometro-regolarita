<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Regolarità PRO - Adaptive</title>
    <style>
        :root { 
            --primary: #00ff00; 
            --bg: #121212; 
            --panel: #1e1e1e; 
            --accent: #1565c0; 
            --danger: #d32f2f; 
            --start: #2e7d32; 
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Container principale per centrare su schermi grandi */
        .container {
            width: 100%;
            max-width: 800px; /* Limita la larghezza su PC */
        }

        /* Display adattivo */
        #display { 
            font-size: clamp(40px, 18vw, 160px); /* Ridimensiona tra min e max */
            font-weight: bold; 
            font-family: 'Courier New', monospace; 
            color: var(--primary); 
            margin: 10px 0;
            line-height: 1;
        }

        #info { font-size: clamp(18px, 6vw, 40px); color: #ffa500; font-weight: bold; margin-top: 15px; }
        #sub-info { font-size: clamp(12px, 3.5vw, 20px); color: #888; margin-bottom: 10px; }

        /* Pannello Configurazione */
        #settingsPanel { 
            background: var(--panel); 
            width: 100%;
            border-radius: 12px; 
            border: 1px solid #444; 
            text-align: left; 
            margin-bottom: 15px;
            overflow: hidden;
        }

        #settingsHeader { 
            background: #333; 
            padding: 15px; 
            cursor: pointer; 
            text-align: center; 
            font-weight: bold; 
            font-size: 16px; 
        }

        #settingsContent { padding: 15px; display: none; overflow-x: auto; }

        /* Tabella PC responsive */
        table { width: 100%; border-collapse: collapse; min-width: 300px; }
        th { font-size: 11px; color: #888; padding: 5px; text-align: left; }
        .pc-row input { 
            background: #000; 
            color: var(--primary); 
            border: 1px solid #444; 
            padding: 8px; 
            border-radius: 4px; 
            font-size: 14px; 
            width: 100%;
            box-sizing: border-box;
        }

        /* Griglia pulsanti adattiva */
        .controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            width: 100%;
            margin-bottom: 15px;
        }

        button { 
            padding: clamp(15px, 4vh, 30px); 
            font-size: clamp(16px, 4vw, 24px); 
            border: none; 
            border-radius: 15px; 
            cursor: pointer; 
            color: white; 
            font-weight: bold; 
            text-transform: uppercase;
            transition: transform 0.1s, filter 0.1s;
        }

        button:active { filter: brightness(1.3); transform: scale(0.97); }
        
        #startBtn { background: var(--start); }
        #nextBtn { background: var(--danger); }
        #saveBtn { background: #6a1b9a; grid-column: span 2; padding: 15px; font-size: 14px; }

        .btn-action { font-size: 13px; padding: 10px; width: 100%; margin: 5px 0; border-radius: 8px; }
        .btn-add { background: #444; }
        .btn-reset { background: #616161; }

        /* Log adattivo */
        #log { 
            background: #000; 
            width: 100%;
            height: clamp(100px, 20vh, 250px); 
            padding: 10px; 
            border-radius: 10px; 
            overflow-y: auto; 
            font-family: monospace; 
            font-size: 12px; 
            border: 1px solid #222; 
            text-align: left;
            box-sizing: border-box;
        }

        /* Media Query per PC/Schermi Grandi */
        @media (min-width: 768px) {
            .controls { grid-template-columns: 1fr 1fr; max-width: 600px; margin-left: auto; margin-right: auto; }
            #display { margin: 30px 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="info">SISTEMA PRONTO</div>
        <div id="sub-info">Configura PC o premi START</div>
        <div id="display">00:00.00</div>

        <div id="settingsPanel">
            <div id="settingsHeader" onclick="toggleSettings()">⚙️ CONFIGURAZIONE PC & GPS</div>
            <div id="settingsContent">
                <table>
                    <thead>
                        <tr>
                            <th style="width:10%">#</th>
                            <th style="width:25%">Tempo</th>
                            <th style="width:45%">GPS (Lat,Lon)</th>
                            <th style="width:20%">Concat</th>
                        </tr>
                    </thead>
                    <tbody id="pcBody"></tbody>
                </table>
                
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button class="btn-action btn-add" onclick="addPCRow()">+ AGGIUNGI</button>
                    <button class="btn-action btn-reset" onclick="resetConfig()">🗑️ RESET</button>
                </div>
                
                <div style="display: flex; gap: 20px; margin-top: 15px; padding-top: 10px; border-top: 1px solid #444;">
                    <label style="font-size:12px">Beep (s): <input type="number" id="beepStart" value="5" style="width:40px"></label>
                    <label style="font-size:12px">GPS (m): <input type="number" id="gpsRange" value="10" style="width:40px"></label>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="startBtn" onclick="toggleGara()">START</button>
            <button id="nextBtn" onclick="prossimoSettore(true)">SPLIT</button>
            <button id="saveBtn" onclick="scaricaRisultati()">SCARICA REPORT (.TXT)</button>
        </div>

        <div id="log"></div>
    </div>

    <script>
        /* Lo script rimane identico alla versione precedente per mantenere la logica PC/GPS intatta */
        let running = false, startTime = 0, PC_List = [], indicePC = 0, lastBeepSecond = -1, logRisultati = [], animationFrame, watchID = null;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        window.onload = () => { addPCRow(); };

        function toggleSettings() {
            const c = document.getElementById('settingsContent');
            c.style.display = (window.getComputedStyle(c).display === 'none') ? 'block' : 'none';
        }

        function addPCRow() {
            const tbody = document.getElementById('pcBody');
            const rowCount = tbody.rows.length + 1;
            const row = tbody.insertRow();
            row.innerHTML = `
                <td style="font-size:12px">${rowCount}</td>
                <td><input type="number" step="0.01" class="pc-time" placeholder="0.0"></td>
                <td><input type="text" class="pc-gps" placeholder="Lat,Lon"></td>
                <td style="text-align:center"><input type="checkbox" class="pc-concat" checked style="width:20px;height:20px"></td>
            `;
        }

        function resetConfig() {
            if (confirm("Resettare tutto?")) location.reload();
        }

        function beep(freq, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = freq; osc.start();
            setTimeout(() => osc.stop(), duration);
        }

        function calcolaDistanza(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function monitoraGPS() {
            if ("geolocation" in navigator) {
                watchID = navigator.geolocation.watchPosition((pos) => {
                    if (!running || indicePC >= PC_List.length) return;
                    const target = PC_List[indicePC].gps;
                    if (target) {
                        const d = calcolaDistanza(pos.coords.latitude, pos.coords.longitude, target.lat, target.lon);
                        if (d <= (parseFloat(document.getElementById('gpsRange').value) || 10)) {
                            prossimoSettore(false); beep(1200, 200);
                        }
                    }
                }, null, { enableHighAccuracy: true });
            }
        }

        function update() {
            if (!running) return;
            const elapsed = (performance.now() - startTime) / 1000;
            const remaining = Math.max(0, PC_List[indicePC].tempo - elapsed);
            
            const mins = Math.floor(remaining / 60), secs = Math.floor(remaining % 60), cents = Math.floor((remaining % 1) * 100);
            document.getElementById('display').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}.${cents.toString().padStart(2,'0')}`;

            const remInt = Math.floor(remaining);
            if (remaining <= parseInt(document.getElementById('beepStart').value) && remInt !== lastBeepSecond && remaining > 0.05) {
                beep(remInt === 0 ? 1500 : 800, remInt === 0 ? 500 : 100);
                lastBeepSecond = remInt;
            }
            if (remaining <= 0) { prossimoSettore(false); return; }
            animationFrame = requestAnimationFrame(update);
        }

        function toggleGara() {
            if (!running) {
                const rows = document.querySelectorAll('#pcBody tr');
                PC_List = Array.from(rows).map(row => {
                    const gps = row.querySelector('.pc-gps').value.split(',');
                    return {
                        tempo: parseFloat(row.querySelector('.pc-time').value),
                        concat: row.querySelector('.pc-concat').checked,
                        gps: gps.length === 2 ? { lat: parseFloat(gps[0]), lon: parseFloat(gps[1]) } : null
                    };
                }).filter(pc => !isNaN(pc.tempo));

                if (PC_List.length === 0) return alert("Inserisci tempi!");
                if (audioCtx.state === 'suspended') audioCtx.resume();
                indicePC = 0; document.getElementById('settingsContent').style.display = 'none';
                monitoraGPS(); startPC();
            } else {
                running = false; if(watchID) navigator.geolocation.clearWatch(watchID);
                cancelAnimationFrame(animationFrame); document.getElementById('startBtn').innerText = "START";
            }
        }

        function startPC() {
            startTime = performance.now(); running = true; lastBeepSecond = -1;
            document.getElementById('startBtn').innerText = "STOP";
            document.getElementById('info').innerText = `PC ${indicePC + 1}`;
            document.getElementById('sub-info').innerText = PC_List[indicePC].gps ? "GPS ATTIVO" : "MANUALE";
            update();
        }

        function prossimoSettore(isManual) {
            const ora = (performance.now() - startTime) / 1000;
            const target = PC_List[indicePC].tempo;
            const scarto = ora - target;
            const entry = `PC${indicePC+1}: T:${target} | E:${ora.toFixed(3)} | Err:${(scarto > 0 ? '+' : '') + scarto.toFixed(3)}`;
            logRisultati.push(entry);
            document.getElementById('log').innerHTML = `<div style="color:#0f0">${entry}</div>` + document.getElementById('log').innerHTML;
            
            running = false; cancelAnimationFrame(animationFrame);
            if (indicePC < PC_List.length - 1) {
                let wasC = PC_List[indicePC].concat; indicePC++;
                if (wasC) startPC();
                else {
                    document.getElementById('display').innerText = "00:00.00";
                    document.getElementById('info').innerText = `ATTESA PC ${indicePC + 1}`;
                    document.getElementById('startBtn').innerText = "START PC";
                }
            } else {
                document.getElementById('display').innerText = "FINISH";
                document.getElementById('info').innerText = "FINE GARA";
            }
        }

        function scaricaRisultati() {
            const blob = new Blob([logRisultati.join("\n")], { type: 'text/plain' });
            const a = document.createElement('a');
            a.download = `report.txt`; a.href = window.URL.createObjectURL(blob); a.click();
        }
    </script>
</body>
</html>
