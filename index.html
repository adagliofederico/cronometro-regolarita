<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Regolarità PRO - Fixed</title>
    <style>
        :root { --primary: #00ff00; --bg: #121212; --panel: #1e1e1e; --accent: #1565c0; --danger: #d32f2f; --start: #2e7d32; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding-bottom: 20px; }
        
        /* Display */
        #display { font-size: 20vw; font-weight: bold; font-family: monospace; color: var(--primary); margin: 5px 0; }
        #info { font-size: 6vw; color: #ffa500; font-weight: bold; margin-top: 10px; }
        #sub-info { font-size: 3.5vw; color: #888; margin-bottom: 5px; }

        /* Pannello Configurazione - CORRETTO */
        #settingsPanel { background: var(--panel); margin: 10px; border-radius: 12px; border: 1px solid #444; text-align: left; position: relative; z-index: 100; overflow: hidden; }
        #settingsHeader { background: #333; padding: 15px; cursor: pointer; text-align: center; font-weight: bold; font-size: 16px; display: block; width: 100%; border: none; color: white; }
        #settingsContent { padding: 15px; display: none; }

        /* Tabella PC */
        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        th { font-size: 10px; color: #888; padding: 5px; text-align: left; }
        .pc-row input { background: #000; color: var(--primary); border: 1px solid #444; padding: 8px; border-radius: 4px; font-size: 14px; }
        .in-time { width: 60px; }
        .in-gps { width: 110px; font-size: 11px !important; }
        
        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 20px; }
        input:checked + .slider { background-color: var(--accent); }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider:before { transform: translateX(16px); }

        /* Pulsanti di controllo */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        button { padding: 20px; font-size: 5vw; border: none; border-radius: 12px; cursor: pointer; color: white; font-weight: bold; text-transform: uppercase; -webkit-tap-highlight-color: transparent; }
        button:active { filter: brightness(1.2); transform: scale(0.96); }
        
        #startBtn { background: var(--start); }
        #nextBtn { background: var(--danger); } /* SPLIT ROSSO */
        
        .btn-action { font-size: 12px; padding: 10px; width: 100%; margin-bottom: 8px; border-radius: 6px; }
        .btn-add { background: #444; }
        .btn-reset { background: #616161; }
        #saveBtn { background: #6a1b9a; grid-column: span 2; font-size: 4vw; padding: 12px; }

        #log { background: #000; margin: 10px; padding: 10px; height: 120px; overflow-y: auto; font-family: monospace; font-size: 11px; border: 1px solid #222; text-align: left; }
    </style>
</head>
<body>

    <div id="info">SISTEMA PRONTO</div>
    <div id="sub-info">Tocca "Configurazione" per inserire i tempi</div>
    <div id="display">00:00.00</div>

    <div id="settingsPanel">
        <div id="settingsHeader" onclick="toggleSettings()">⚙️ CONFIGURAZIONE PC & GPS</div>
        <div id="settingsContent">
            <table id="pcTable">
                <thead>
                    <tr>
                        <th>PC</th>
                        <th>Tempo</th>
                        <th>GPS (Lat,Lon)</th>
                        <th>CONCATENATE.</th>
                    </tr>
                </thead>
                <tbody id="pcBody"></tbody>
            </table>
            
            <button class="btn-action btn-add" onclick="addPCRow()">+ AGGIUNGI PROVA</button>
            <button class="btn-action btn-reset" onclick="resetConfig()">🗑️ RESET CONFIGURAZIONE</button>
            
            <div style="display: flex; gap: 15px; margin-top: 15px; border-top: 1px solid #444; padding-top: 15px;">
                <div>
                    <label style="font-size: 11px; color: #888;">Beep ultimi (s):</label><br>
                    <input type="number" id="beepStart" value="5" style="width: 50px; background: #000; color: #0f0; border: 1px solid #444; padding: 5px;">
                </div>
                <div>
                    <label style="font-size: 11px; color: #888;">Raggio GPS (m):</label><br>
                    <input type="number" id="gpsRange" value="10" style="width: 50px; background: #000; color: #0f0; border: 1px solid #444; padding: 5px;">
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn" onclick="toggleGara()">START</button>
        <button id="nextBtn" onclick="prossimoSettore(true)">SPLIT</button>
        <button id="saveBtn" onclick="scaricaRisultati()">SCARICA REPORT (.TXT)</button>
    </div>

    <div id="log"></div>

    <script>
        let running = false;
        let startTime = 0;
        let PC_List = [];
        let indicePC = 0;
        let lastBeepSecond = -1;
        let logRisultati = [];
        let animationFrame;
        let watchID = null;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        window.onload = () => { addPCRow(); };

        function toggleSettings() {
            const c = document.getElementById('settingsContent');
            const current = window.getComputedStyle(c).display;
            c.style.display = (current === 'none') ? 'block' : 'none';
        }

        function addPCRow() {
            const tbody = document.getElementById('pcBody');
            const rowCount = tbody.rows.length + 1;
            const row = tbody.insertRow();
            row.className = "pc-row";
            row.innerHTML = `
                <td style="font-size:12px">${rowCount}</td>
                <td><input type="number" step="0.01" class="pc-time in-time" placeholder="0.0"></td>
                <td><input type="text" class="pc-gps in-gps" placeholder="45.x, 9.x"></td>
                <td>
                    <label class="switch">
                        <input type="checkbox" class="pc-concat" checked>
                        <span class="slider"></span>
                    </label>
                </td>
            `;
        }

        function resetConfig() {
            if (confirm("Attenzione: questo cancellerà tutti i tempi inseriti. Procedere?")) {
                document.getElementById('pcBody').innerHTML = "";
                addPCRow();
                PC_List = [];
                indicePC = 0;
                logRisultati = [];
                document.getElementById('log').innerHTML = "";
                document.getElementById('display').innerText = "00:00.00";
                document.getElementById('info').innerText = "CONFIGURAZIONE RESETTATA";
            }
        }

        function beep(freq, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = freq; osc.start();
            setTimeout(() => osc.stop(), duration);
        }

        function calcolaDistanza(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function monitoraGPS() {
            if ("geolocation" in navigator) {
                watchID = navigator.geolocation.watchPosition((pos) => {
                    if (!running || indicePC >= PC_List.length) return;
                    const targetCoords = PC_List[indicePC].gps;
                    if (targetCoords) {
                        const d = calcolaDistanza(pos.coords.latitude, pos.coords.longitude, targetCoords.lat, targetCoords.lon);
                        const raggio = parseFloat(document.getElementById('gpsRange').value) || 10;
                        if (d <= raggio) {
                            prossimoSettore(false);
                            beep(1200, 200); 
                        }
                    }
                }, null, { enableHighAccuracy: true });
            }
        }

        function update() {
            if (!running) return;
            const elapsed = (performance.now() - startTime) / 1000;
            const target = PC_List[indicePC].tempo;
            const remaining = Math.max(0, target - elapsed);

            const mins = Math.floor(remaining / 60);
            const secs = Math.floor(remaining % 60);
            const cents = Math.floor((remaining % 1) * 100);
            document.getElementById('display').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}.${cents.toString().padStart(2,'0')}`;

            const remInt = Math.floor(remaining);
            const bStart = parseInt(document.getElementById('beepStart').value);

            if (remaining <= bStart && remInt !== lastBeepSecond && remaining > 0.05) {
                beep(remInt === 0 ? 1500 : 800, remInt === 0 ? 500 : 100);
                lastBeepSecond = remInt;
            }

            if (remaining <= 0) { prossimoSettore(false); return; }
            animationFrame = requestAnimationFrame(update);
        }

        function toggleGara() {
            if (!running) {
                const rows = document.querySelectorAll('.pc-row');
                PC_List = Array.from(rows).map(row => {
                    const gpsInput = row.querySelector('.pc-gps').value;
                    const gpsVal = gpsInput ? gpsInput.split(',') : [];
                    return {
                        tempo: parseFloat(row.querySelector('.pc-time').value),
                        concat: row.querySelector('.pc-concat').checked,
                        gps: gpsVal.length === 2 ? { lat: parseFloat(gpsVal[0]), lon: parseFloat(gpsVal[1]) } : null
                    };
                }).filter(pc => !isNaN(pc.tempo));

                if (PC_List.length === 0) return alert("Errore: Inserisci almeno un tempo!");
                
                if (audioCtx.state === 'suspended') audioCtx.resume();
                indicePC = 0;
                document.getElementById('settingsContent').style.display = 'none';
                monitoraGPS();
                startPC();
            } else {
                running = false;
                if(watchID) navigator.geolocation.clearWatch(watchID);
                cancelAnimationFrame(animationFrame);
                document.getElementById('startBtn').innerText = "START";
            }
        }

        function startPC() {
            startTime = performance.now();
            running = true;
            lastBeepSecond = -1;
            document.getElementById('startBtn').innerText = "STOP";
            document.getElementById('info').innerText = `PC ${indicePC + 1}`;
            document.getElementById('sub-info').innerText = PC_List[indicePC].gps ? "GPS ATTIVO" : "MANUALE";
            update();
        }

        function prossimoSettore(isManual) {
            const ora = (performance.now() - startTime) / 1000;
            const target = PC_List[indicePC].tempo;
            const scarto = ora - target;
            const entry = `PC${indicePC+1}: T:${target} | E:${ora.toFixed(3)} | Err:${(scarto > 0 ? '+' : '') + scarto.toFixed(3)}`;
            
            logRisultati.push(entry);
            document.getElementById('log').innerHTML = `<div style="color:#0f0">${entry}</div>` + document.getElementById('log').innerHTML;

            running = false;
            cancelAnimationFrame(animationFrame);

            if (indicePC < PC_List.length - 1) {
                let wasConcat = PC_List[indicePC].concat;
                indicePC++;
                if (wasConcat) {
                    startPC();
                } else {
                    document.getElementById('display').innerText = "00:00.00";
                    document.getElementById('info').innerText = `ATTESA PC ${indicePC + 1}`;
                    document.getElementById('startBtn').innerText = "START PC";
                }
            } else {
                document.getElementById('display').innerText = "FINISH";
                document.getElementById('info').innerText = "GARA COMPLETATA";
                if(watchID) navigator.geolocation.clearWatch(watchID);
            }
        }

        function scaricaRisultati() {
            if (logRisultati.length === 0) return alert("Nessun dato da salvare.");
            const blob = new Blob([logRisultati.join("\n")], { type: 'text/plain' });
            const a = document.createElement('a');
            a.download = `report_gara.txt`;
            a.href = window.URL.createObjectURL(blob);
            a.click();
        }
    </script>
</body>
</html>
